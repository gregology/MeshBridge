# MeshBridge Configuration
# Copy this file and edit for your setup:
#   cp config.example.yaml config.yaml
# Or run the setup wizard:
#   meshbridge setup

bridge:
  # Display name used when the bridge itself originates messages
  # (e.g. ping/pong responses shown on Discord). Defaults to "MeshBridge".
  display_name: "MeshBridge"

device:
  # Serial port for the MeshCore USB Companion device.
  # Find yours with: ls -la /dev/serial/by-id/
  serial_port: "/dev/serial/by-id/usb-Silicon_Labs_CP2102_USB_to_UART_Bridge_Controller_0001-if00-port0"
  baudrate: 115200
  # Optional: Set the MeshCore radio device name on startup. Other nodes on
  # the mesh will see this name. If omitted, the existing device name is
  # left unchanged.
  # name: "MeshBridge"

mqtt:
  broker: "127.0.0.1"
  port: 1883
  username: "meshbridge"
  password: "changeme"
  # Topic prefix for all MQTT messages. Change this if running multiple
  # bridges on the same MQTT broker.
  topic_prefix: "meshbridge"

logging:
  # DEBUG, INFO, WARNING, ERROR
  level: "INFO"
  # Log file path, or null for stdout only
  file: null

plugins:
  discord:
    enabled: true
    # Create a webhook: Server Settings > Integrations > Webhooks
    webhook_url: "https://discord.com/api/webhooks/YOUR_WEBHOOK_ID/YOUR_WEBHOOK_TOKEN"
    # Display name for messages posted to Discord
    bot_username: "MeshBridge"
    # Optional avatar URL for the webhook bot
    avatar_url: ""
    # Show metadata (hops, channel, sender key) in Discord embeds
    include_metadata: true
    # Which mesh channels to forward (empty list = all channels)
    channels: [0]
    # Which event types to forward to Discord
    event_types:
      - CHANNEL_MESSAGE
      - CONTACT_MESSAGE

    # --- Discord Bot mode (bidirectional) ---
    # Enable to receive messages FROM Discord (e.g. ping/pong).
    # Requires: pip install meshbridge[discord-bot]
    # bot_token: ""
    # bot_channel_id: ""

  ping:
    # Responds with "pong" when someone sends "ping", "radio check", etc.
    enabled: true

  homeassistant:
    enabled: false
    # Home Assistant base URL
    url: "http://homeassistant.local:8123"
    # Long-lived access token (create in HA: Profile > Security > Long-Lived Access Tokens)
    token: "YOUR_LONG_LIVED_ACCESS_TOKEN"
    # Each command maps a regex pattern to a Home Assistant entity.
    # First matching command wins. Response templates use HA state fields:
    #   {state}                  - entity state value
    #   {attributes[key]}       - entity attribute (e.g. temperature, unit_of_measurement)
    #   {entity_id}             - the entity ID
    #   {last_changed}          - last state change timestamp
    commands:
      - pattern: "(?i)^\\s*(weather|forecast)\\s*$"
        entity_id: "weather.home"
        response: "{state} — {attributes[temperature]}°{attributes[temperature_unit]}"
      - pattern: "(?i)^\\s*(temp|temperature)\\s*$"
        entity_id: "sensor.outdoor_temperature"
        response: "Temp: {state}°{attributes[unit_of_measurement]}"
      - pattern: "(?i)^\\s*humidity\\s*$"
        entity_id: "sensor.outdoor_humidity"
        response: "Humidity: {state}{attributes[unit_of_measurement]}"
